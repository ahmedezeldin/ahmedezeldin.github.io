<div class="page-circuit-bg" aria-hidden="true">
  <svg viewBox="0 0 1400 2600" class="page-circuit-svg" preserveAspectRatio="none">
    <defs>
      <filter id="circuitGlow">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <!-- HERO NETWORK -->
    <path class="bg-trace base" d="M500 220 H660 V120 H900 V300 H1160" />
    <path class="bg-trace base" d="M580 500 H760 V640 H990 V520 H1240" />
    <path class="bg-trace base" d="M900 300 H900 V620 H430" />
    <path class="bg-trace base" d="M760 640 H430" />

    <!-- MAIN TRUNK aligned to section-node column -->
    <path class="bg-trace base" d="M430 620 V2390" />

    <!-- ABOUT JUNCTION -->
    <path class="bg-trace base" d="M70 840 H430" />
    <path class="bg-trace base" d="M430 840 H620 V760 H980" />

    <!-- EDUCATION JUNCTION -->
    <path class="bg-trace base" d="M90 1160 H430" />
    <path class="bg-trace base" d="M430 1160 H620 V1030 H1120" />

    <!-- PROJECT JUNCTION -->
    <path class="bg-trace base" d="M60 1490 H430" />
    <path class="bg-trace base" d="M430 1490 H600 V1600 H1070" />

    <!-- EXPERIENCE JUNCTION -->
    <path class="bg-trace base" d="M100 1810 H430" />
    <path class="bg-trace base" d="M430 1810 H690 V1670 H1180" />

    <!-- SKILLS JUNCTION -->
    <path class="bg-trace base" d="M75 2140 H430" />
    <path class="bg-trace base" d="M430 2140 H610 V2260 H1030" />

    <!-- CONTACT JUNCTION -->
    <path class="bg-trace base" d="M90 2390 H430" />
    <path class="bg-trace base" d="M430 2390 H670 V2470 H1110" />

    <!-- EXTRA RIGHT SIDE FILL -->
    <path class="bg-trace base" d="M980 760 H1260" />
    <path class="bg-trace base" d="M1120 1030 H1300" />
    <path class="bg-trace base" d="M1070 1600 H1290" />
    <path class="bg-trace base" d="M1180 1670 H1320" />
    <path class="bg-trace base" d="M1030 2260 H1270" />
    <path class="bg-trace base" d="M1110 2470 H1320" />

    <!-- ACTIVE TRACES -->
    <path class="bg-trace active delay-1" d="M500 220 H660 V120 H900 V300 H1160" />
    <path class="bg-trace active delay-2" d="M580 500 H760 V640 H990 V520 H1240" />
    <path class="bg-trace active delay-3" d="M900 300 H900 V620 H430" />
    <path class="bg-trace active delay-4" d="M430 620 V2390" />

    <path class="bg-trace active delay-5" d="M70 840 H430" />
    <path class="bg-trace active delay-6" d="M90 1160 H430" />
    <path class="bg-trace active delay-7" d="M60 1490 H430" />
    <path class="bg-trace active delay-8" d="M100 1810 H430" />
    <path class="bg-trace active delay-5" d="M75 2140 H430" />
    <path class="bg-trace active delay-6" d="M90 2390 H430" />

    <path class="bg-trace active delay-2" d="M430 840 H620 V760 H980" />
    <path class="bg-trace active delay-3" d="M430 1160 H620 V1030 H1120" />
    <path class="bg-trace active delay-4" d="M430 1490 H600 V1600 H1070" />
    <path class="bg-trace active delay-5" d="M430 1810 H690 V1670 H1180" />
    <path class="bg-trace active delay-6" d="M430 2140 H610 V2260 H1030" />
    <path class="bg-trace active delay-7" d="M430 2390 H670 V2470 H1110" />

    <!-- JUNCTION NODES -->
    <circle class="bg-node pulse-1" cx="660" cy="120" r="8" />
    <circle class="bg-node pulse-2" cx="900" cy="300" r="8" />
    <circle class="bg-node pulse-3" cx="760" cy="640" r="8" />
    <circle class="bg-node pulse-4" cx="430" cy="620" r="8" />

    <circle class="bg-node pulse-5" cx="430" cy="840" r="8" />
    <circle class="bg-node pulse-6" cx="430" cy="1160" r="8" />
    <circle class="bg-node pulse-7" cx="430" cy="1490" r="8" />
    <circle class="bg-node pulse-8" cx="430" cy="1810" r="8" />
    <circle class="bg-node pulse-9" cx="430" cy="2140" r="8" />
    <circle class="bg-node pulse-10" cx="430" cy="2390" r="8" />

    <circle class="bg-node pulse-11" cx="620" cy="760" r="8" />
    <circle class="bg-node pulse-12" cx="620" cy="1030" r="8" />
    <circle class="bg-node pulse-13" cx="600" cy="1600" r="8" />
    <circle class="bg-node pulse-14" cx="690" cy="1670" r="8" />
    <circle class="bg-node pulse-15" cx="610" cy="2260" r="8" />
    <circle class="bg-node pulse-16" cx="670" cy="2470" r="8" />

    <!-- SIGNAL DOTS -->
    <circle class="signal-dot dot-1" r="6" filter="url(#circuitGlow)">
      <animateMotion dur="7.5s" repeatCount="indefinite" path="M900 300 H900 V620 H430" />
    </circle>

    <circle class="signal-dot dot-2" r="6" filter="url(#circuitGlow)">
      <animateMotion dur="10s" begin="1.2s" repeatCount="indefinite" path="M430 620 V2390" />
    </circle>

    <circle class="signal-dot dot-3" r="6" filter="url(#circuitGlow)">
      <animateMotion dur="8.6s" begin="2.1s" repeatCount="indefinite" path="M430 1160 H620 V1030 H1120" />
    </circle>

    <circle class="signal-dot dot-4" r="6" filter="url(#circuitGlow)">
      <animateMotion dur="8.8s" begin="3.2s" repeatCount="indefinite" path="M430 1810 H690 V1670 H1180" />
    </circle>
  </svg>
</div>
